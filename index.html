<!DOCTYPE html>
<html>
<head>
<title>С 8 Марта ❤️</title>

<style>
body{
background: linear-gradient(pink, white);
text-align:center;
font-family:Arial;
overflow:hidden;
}

h1{
margin-top:100px;
font-size:50px;
color:#ff2e63;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:20px;
background:#ff2e63;
color:white;
cursor:pointer;
}

.heart{
position:fixed;
color:red;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<h1>С 8 Марта ❤️</h1>

<button onclick="showLove()">Нажми здесь</button>

<p id="text"></p>

<audio autoplay loop>
<source src="music.mp3">
</audio>

<script>

function showLove(){
document.getElementById("text").innerHTML =
"Ты самая прекрасная девушка ❤️";

for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*30+20+"px";
document.body.appendChild(heart);
}

}

</script>

</body>
</html>
